<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Pong</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23050816'/%3E%3Cpath d='M16 22h14v8H16zm18 0h14v8H34zM20 36h24v8H20z' fill='%2352f5c6'/%3E%3Cpath d='M20 18h24' stroke='%23a448ff' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E" />
    <style>
      :root {
        color-scheme: dark;
        --mint: #52f5c6;
        --purple: #a448ff;
        --bg: #050816;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        color: white;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        display: grid;
        place-items: center;
        padding: clamp(1rem, 3vw, 2.25rem);
      }
      #gameShell {
        position: relative;
        width: min(92vw, 1120px);
        height: min(78vh, 760px);
        border-radius: 1.75rem;
        border: 1px solid rgba(255, 255, 255, 0.16);
        overflow: hidden;
        background: rgba(2, 4, 15, 0.55);
        box-shadow: 0 0 0 1px rgba(82, 245, 198, 0.12), 0 24px 80px rgba(2, 4, 15, 0.45);
      }
      #gameShell::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        border: 1px solid rgba(164, 72, 255, 0.22);
        pointer-events: none;
      }
      canvas { display: block; width: 100%; height: 100%; }
      #overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1rem;
        background: rgba(2, 4, 15, 0.45);
        color: white;
        text-align: center;
        padding: 2rem;
        transition: opacity 0.2s ease;
      }
      #overlay.hidden { opacity: 0; pointer-events: none; }
      #overlay h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3rem);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      #overlay p {
        margin: 0;
        max-width: 32rem;
        font-size: 1rem;
        line-height: 1.5;
        color: rgba(255,255,255,0.8);
      }
      #hud {
        position: absolute;
        inset: 1.25rem auto auto 1.25rem;
        display: flex;
        gap: 1rem;
        z-index: 2;
      }
      .pill {
        padding: 0.7rem 1rem;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.16);
        background: rgba(5, 8, 22, 0.7);
        backdrop-filter: blur(10px);
        box-shadow: 0 0 0 1px rgba(82, 245, 198, 0.15), 0 0 40px rgba(164, 72, 255, 0.12);
      }
      .pill strong { display: block; font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mint); }
      .pill span { font-size: 1.15rem; font-weight: 700; }
      .accent { color: var(--mint); }
    </style>
  </head>
  <body>
    <div id="gameShell">
      <div id="hud">
        <div class="pill"><strong>Bounces</strong><span id="bounceValue">0</span></div>
        <div class="pill"><strong>Best</strong><span id="bestValue">0</span></div>
      </div>
      <div id="overlay">
        <h1>Neon Pong</h1>
        <p>Move your paddle with the mouse. Keep the ball alive as long as you can. Each clean return adds another bounce to your streak.</p>
        <p class="accent">Click or press space to start.</p>
      </div>
    </div>
 
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>
      const overlay = document.getElementById('overlay');
      const bounceValue = document.getElementById('bounceValue');
      const bestValue = document.getElementById('bestValue');

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);
      scene.fog = new THREE.Fog(0x050816, 12, 34);

      const gameShell = document.getElementById('gameShell');
      const camera = new THREE.PerspectiveCamera(70, gameShell.clientWidth / gameShell.clientHeight, 0.1, 100);
      camera.position.set(0, 0.6, 7.0);
      camera.lookAt(0, 0, -2.0);
 
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(gameShell.clientWidth, gameShell.clientHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      gameShell.appendChild(renderer.domElement);

      const clock = new THREE.Clock();
      const mouse = new THREE.Vector2();
      let bestScore = 0;
      let bounces = 0;
      let gameActive = false;
      let gameOver = true;
      let ballVelocity = new THREE.Vector3();
      let ballCurve = 0;

      const arena = new THREE.Group();
      scene.add(arena);

      const room = {
        width: 5.6,
        height: 3.8,
        depth: 12,
        frontZ: 1.5,
        backZ: -9.5,
      };
      const wallMaterial = new THREE.ShaderMaterial({
        uniforms: {
          colorA: { value: new THREE.Color(0xa448ff) },
          colorB: { value: new THREE.Color(0x52f5c6) },
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform vec3 colorA;
          uniform vec3 colorB;
          varying vec2 vUv;
          void main() {
            float t = vUv.x * 0.6 + vUv.y * 0.4;
            vec3 col = mix(colorA, colorB, t);
            gl_FragColor = vec4(col, 0.72);
          }
        `,
        transparent: true,
        side: THREE.DoubleSide,
      });

      const courtDepth = room.frontZ - room.backZ;
      const courtCenterZ = (room.frontZ + room.backZ) / 2;

      const floor = new THREE.Mesh(new THREE.PlaneGeometry(room.width, courtDepth), wallMaterial);
      floor.rotation.x = -Math.PI / 2;
      floor.position.set(0, -room.height / 2, courtCenterZ);
      arena.add(floor);

      const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(room.width, courtDepth), wallMaterial);
      ceiling.rotation.x = Math.PI / 2;
      ceiling.position.set(0, room.height / 2, courtCenterZ);
      arena.add(ceiling);

      const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(courtDepth, room.height), wallMaterial);
      leftWall.rotation.y = Math.PI / 2;
      leftWall.position.set(-room.width / 2, 0, courtCenterZ);
      arena.add(leftWall);

      const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(courtDepth, room.height), wallMaterial);
      rightWall.rotation.y = -Math.PI / 2;
      rightWall.position.set(room.width / 2, 0, courtCenterZ);
      arena.add(rightWall);

      const backWall = new THREE.Mesh(new THREE.PlaneGeometry(room.width, room.height), wallMaterial);
      backWall.position.set(0, 0, room.backZ);
      arena.add(backWall);

      const depthLines = new THREE.Group();
      arena.add(depthLines);
      const ringCount = 10;
      const depthLineObjects = [];
      const hw = room.width / 2 - 0.05;
      const hh = room.height / 2 - 0.05;
      const ringThickness = 0.055;
      for (let i = 0; i < ringCount; i += 1) {
        const t = i / (ringCount - 1);
        const z = room.backZ + t * courtDepth;
        const color = i % 2 === 0 ? 0x52f5c6 : 0xa448ff;
        const mats = [0,1,2,3].map(() =>
          new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.18 })
        );
        const ringGroup = new THREE.Group();
        // bottom
        const bottom = new THREE.Mesh(new THREE.BoxGeometry(hw * 2, ringThickness, ringThickness), mats[0]);
        bottom.position.set(0, -hh, z); ringGroup.add(bottom);
        // top
        const top = new THREE.Mesh(new THREE.BoxGeometry(hw * 2, ringThickness, ringThickness), mats[1]);
        top.position.set(0, hh, z); ringGroup.add(top);
        // left
        const left = new THREE.Mesh(new THREE.BoxGeometry(ringThickness, hh * 2, ringThickness), mats[2]);
        left.position.set(-hw, 0, z); ringGroup.add(left);
        // right
        const right = new THREE.Mesh(new THREE.BoxGeometry(ringThickness, hh * 2, ringThickness), mats[3]);
        right.position.set(hw, 0, z); ringGroup.add(right);

        depthLines.add(ringGroup);
        depthLineObjects.push({ ringGroup, mats, z });
      }

      const ambient = new THREE.AmbientLight(0x88a3ff, 0.6);
      scene.add(ambient);

      const keyLight = new THREE.DirectionalLight(0x52f5c6, 1.2);
      keyLight.position.set(4, 8, 6);
      scene.add(keyLight);

      const rimLight = new THREE.PointLight(0xa448ff, 20, 50, 2);
      rimLight.position.set(-6, 2, -8);
      scene.add(rimLight);

      const paddleGroup = new THREE.Group();
      paddleGroup.position.set(0, 0, room.frontZ);
      scene.add(paddleGroup);

      const paddleBody = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 0.45, 0.25),
        new THREE.MeshStandardMaterial({
          color: 0x0b1430,
          emissive: 0x52f5c6,
          emissiveIntensity: 0.55,
          roughness: 0.2,
          metalness: 0.4,
          transparent: true,
          opacity: 0.7,
        })
      );
      paddleBody.position.z = 0;
      paddleGroup.add(paddleBody);

      const paddleGlow = new THREE.Mesh(
        new THREE.BoxGeometry(0.9, 0.52, 0.06),
        new THREE.MeshBasicMaterial({ color: 0xa448ff, transparent: true, opacity: 0.7 })
      );
      paddleGlow.position.z = 0.01;
      paddleGroup.add(paddleGlow);

      const paddleHitZone = new THREE.Mesh(
        new THREE.BoxGeometry(0.7, 0.3, 0.04),
        new THREE.MeshBasicMaterial({ color: 0x52f5c6, transparent: true, opacity: 0.95 })
      );
      paddleHitZone.position.z = 0.08;
      paddleGroup.add(paddleHitZone);

      // Sweet spot — small center zone that flashes on perfect hit
      const sweetSpotW = 0.22;
      const sweetSpotH = 0.14;
      const sweetSpotMat = new THREE.MeshBasicMaterial({ color: 0xff2dff, transparent: true, opacity: 0.45 });
      const sweetSpot = new THREE.Mesh(
        new THREE.BoxGeometry(sweetSpotW, sweetSpotH, 0.045),
        sweetSpotMat
      );
      sweetSpot.position.z = 0.1;
      paddleGroup.add(sweetSpot);
      let sweetSpotFlash = 0; // countdown timer

      const ball = new THREE.Mesh(
        new THREE.SphereGeometry(0.17, 32, 32),
        new THREE.MeshStandardMaterial({
          color: 0xff2dff,
          emissive: 0xff2dff,
          emissiveIntensity: 1.2,
          roughness: 0.15,
          metalness: 0.6,
        })
      );
      scene.add(ball);


      const BASE_SPEED = 0.75;
      let currentSpeed = BASE_SPEED;
      const ballRadius = 0.17;
      const ballStart = new THREE.Vector3(0, 0, room.backZ + 2.5);
      function resetBall() {
        ball.position.copy(ballStart);
        currentSpeed = BASE_SPEED;
        ballVelocity.set(
          (0.08 + Math.random() * 0.06) * (Math.random() < 0.5 ? 1 : -1),
          (0.04 + Math.random() * 0.04) * (Math.random() < 0.5 ? 1 : -1),
          currentSpeed
        );
        ballCurve = 0;
      }

      function resetGame() {
        bounces = 0;
        updateHud();
        resetBall();
        gameOver = false;
        gameActive = true;
        overlay.classList.add('hidden');
      }

      function updateHud() {
        bounceValue.textContent = String(bounces);
        bestValue.textContent = String(bestScore);
      }

      function handlePaddleBounce() {
        const impactX = (ball.position.x - paddleGroup.position.x) / 2.1;
        const impactY = (ball.position.y - paddleGroup.position.y) / 1.1;

        // Sweet spot check
        const inSweetX = Math.abs(ball.position.x - paddleGroup.position.x) <= sweetSpotW / 2;
        const inSweetY = Math.abs(ball.position.y - paddleGroup.position.y) <= sweetSpotH / 2;
        if (inSweetX && inSweetY) {
          sweetSpotFlash = 0.35; // seconds to flash
        }

        bounces += 1;
        currentSpeed *= 1.05;
        if (bounces === 5)  currentSpeed *= 1.2;
        if (bounces === 10) currentSpeed *= 1.5;
        if (bounces === 15) currentSpeed *= 2.0;

        ballVelocity.z = -currentSpeed;
        ballVelocity.x = ballVelocity.x * 0.85 + impactX * 0.32;
        ballVelocity.y = ballVelocity.y * 0.85 + impactY * 0.22;
        ballCurve += impactX * 0.045;
        bestScore = Math.max(bestScore, bounces);
        updateHud();
      }

      const raycaster = new THREE.Raycaster();
      const paddlePlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), -room.frontZ);
      const paddleTarget = new THREE.Vector3();

      gameShell.addEventListener('mousemove', (event) => {
        const rect = gameShell.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      });

      const resizeRenderer = () => {
        const width = gameShell.clientWidth || window.innerWidth;
        const height = gameShell.clientHeight || window.innerHeight;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
      };

      window.addEventListener('resize', resizeRenderer);
      resizeRenderer();

      window.addEventListener('mousedown', () => {
        if (gameOver) {
          resetGame();
        }
      });

      window.addEventListener('keydown', (event) => {
        if (event.code === 'Space') {
          event.preventDefault();
          if (gameOver) {
            resetGame();
          }
        }
      });

      function animate() {
        requestAnimationFrame(animate);
        const delta = Math.min(clock.getDelta(), 0.035);

        if (gameActive && !gameOver) {
              raycaster.setFromCamera(mouse, camera);
              if (raycaster.ray.intersectPlane(paddlePlane, paddleTarget)) {
                paddleGroup.position.x = Math.max(-room.width / 2 + 0.42, Math.min(room.width / 2 - 0.42, paddleTarget.x));
                paddleGroup.position.y = Math.max(-room.height / 2 + 0.25, Math.min(room.height / 2 - 0.25, paddleTarget.y));
              }

              const speed = delta * 8.6;
          const curveBoost = ballCurve * delta * 1.2;
          ballVelocity.x += curveBoost;
          ballVelocity.y += (Math.sin(ball.position.z * 0.26 + ball.position.x * 0.15) * 0.0018) * speed;
          ballCurve *= 0.95;

          ball.position.addScaledVector(ballVelocity, speed);

          // Animate sweet spot flash
          if (sweetSpotFlash > 0) {
            sweetSpotFlash -= delta;
            const t = Math.max(0, sweetSpotFlash / 0.35);
            sweetSpotMat.opacity = 0.45 + t * 0.5;
          }

          const courtHalfWidth = room.width / 2;
          const courtHalfHeight = room.height / 2;

          if (ball.position.x + ballRadius >= courtHalfWidth) {
            ball.position.x = courtHalfWidth - ballRadius;
            ballVelocity.x = -Math.abs(ballVelocity.x);
          }
          if (ball.position.x - ballRadius <= -courtHalfWidth) {
            ball.position.x = -courtHalfWidth + ballRadius;
            ballVelocity.x = Math.abs(ballVelocity.x);
          }
          if (ball.position.y + ballRadius >= courtHalfHeight) {
            ball.position.y = courtHalfHeight - ballRadius;
            ballVelocity.y = -Math.abs(ballVelocity.y);
          }
          if (ball.position.y - ballRadius <= -courtHalfHeight) {
            ball.position.y = -courtHalfHeight + ballRadius;
            ballVelocity.y = Math.abs(ballVelocity.y);
          }
          if (ball.position.z - ballRadius <= room.backZ) {
            ball.position.z = room.backZ + ballRadius;
            ballVelocity.z = Math.abs(ballVelocity.z);
          }

          // Front wall = paddle plane. Ball must not pass it.
          const frontWallZ = room.frontZ - 0.12;
          if (ball.position.z + ballRadius >= frontWallZ && ballVelocity.z > 0) {
            const paddleW = 0.8;
            const paddleH = 0.45;
            const hitByPaddle =
              ball.position.x >= paddleGroup.position.x - paddleW / 2 - ballRadius &&
              ball.position.x <= paddleGroup.position.x + paddleW / 2 + ballRadius &&
              ball.position.y >= paddleGroup.position.y - paddleH / 2 - ballRadius &&
              ball.position.y <= paddleGroup.position.y + paddleH / 2 + ballRadius;
            // Always bounce off the front wall
            ball.position.z = frontWallZ - ballRadius;
            ballVelocity.z = -Math.abs(ballVelocity.z);
            if (hitByPaddle) {
              handlePaddleBounce();
            } else {
              // Missed — let ball visibly bounce back, then end game
              gameActive = false;
              setTimeout(() => {
                gameOver = true;
                overlay.classList.remove('hidden');
                overlay.innerHTML = `
                  <h1>Missed!</h1>
                  <p>Your streak ended at <strong>${bounces}</strong> bounce${bounces === 1 ? '' : 's'}.</p>
                  <p class="accent">Click or press space to try again.</p>
                `;
              }, 600);
            }
          }

          depthLineObjects.forEach(({ mats, z }) => {
            const dist = Math.abs(ball.position.z - z);
            const glow = Math.max(0, 1 - dist / 2.0);
            const opacity = 0.12 + glow * 0.72;
            mats.forEach(m => { m.opacity = opacity; });
          });
        }

        const cameraTarget = new THREE.Vector3(0, 0.6, 7.0);
        camera.position.lerp(cameraTarget, 0.08);
        camera.lookAt(0, 0, -2.0);
        renderer.render(scene, camera);
      }

      updateHud();
      resetBall();
      overlay.classList.remove('hidden');
      animate();
    </script>
  </body>
</html>
